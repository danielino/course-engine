id          = "22-lifetimes-or-ownership"
title       = "Memory Management"
description = "Understand stack vs heap, use malloc/free, realloc for dynamic arrays, and manage string memory."

[[exercises]]
id              = "ex_01"
title           = "Stack Allocation"
prompt          = """In C, local variables live on the stack — memory that is automatically allocated when you enter a function and freed when you leave. Stack allocation is fast and automatic, but limited in size and tied to the function's lifetime. Declare int a = 42 on the stack and print its value: Stack value: 42"""
expected_output = "Stack value: 42"
starter_code    = """#include <stdio.h>

int main() {
    int a = 42;   // Stack-allocated integer
    printf("Stack value: %d\n", a);
    return 0;
}"""
hints = [
    "The code is nearly complete — just run it. Stack variables are automatically freed when main returns.",
    "printf(\"Stack value: %d\\n\", a);"
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "Heap Allocation with malloc"
prompt          = """The heap is memory you manage manually. malloc(size) allocates 'size' bytes and returns a void*. You must free() the pointer when you're done, or the memory leaks. Allocate a single int on the heap, set it to 100, print its value, then free it. Print: Heap value: 100"""
expected_output = "Heap value: 100"
starter_code    = """#include <stdio.h>
#include <stdlib.h>

int main() {
    int *p = (int *)malloc(sizeof(int));
    // Set *p to 100, print "Heap value: 100", then free
    return 0;
}"""
hints = [
    "Dereference the pointer with *p = 100; to set the value. printf(\"Heap value: %d\\n\", *p);",
    "*p = 100;\nprintf(\"Heap value: %d\\n\", *p);\nfree(p);"
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Dynamic Array of Squares"
prompt          = """A common use of malloc is creating arrays whose size is not known at compile time. Allocate an array of 5 ints, fill it with the squares 1, 4, 9, 16, 25, print them, then free. Print: 1 4 9 16 25"""
expected_output = "1 4 9 16 25"
starter_code    = """#include <stdio.h>
#include <stdlib.h>

int main() {
    int n = 5;
    int *arr = (int *)malloc(n * sizeof(int));
    // Fill: arr[i] = (i+1)*(i+1)
    // Print space-separated
    free(arr);
    return 0;
}"""
hints = [
    "Loop i from 0 to n-1. arr[i] = (i+1) * (i+1); Then print with the space-before pattern.",
    "for (int i = 0; i < n; i++) arr[i] = (i+1)*(i+1);\nfor (int i = 0; i < n; i++) {\n    if (i > 0) printf(\" \");\n    printf(\"%d\", arr[i]);\n}\nprintf(\"\\n\");"
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Growing an Array with realloc"
prompt          = """realloc() resizes a previously malloc'd block, preserving its contents. It may move the data to a new address, so you must update your pointer. Allocate an array of 3 elements {1, 2, 3}, then realloc to 5 elements and add {4, 5}. Print: 1 2 3 4 5"""
expected_output = "1 2 3 4 5"
starter_code    = """#include <stdio.h>
#include <stdlib.h>

int main() {
    int *arr = (int *)malloc(3 * sizeof(int));
    arr[0] = 1; arr[1] = 2; arr[2] = 3;
    // Realloc to 5 elements
    // Add arr[3]=4, arr[4]=5
    // Print all 5 elements
    free(arr);
    return 0;
}"""
hints = [
    "arr = (int *)realloc(arr, 5 * sizeof(int)); updates arr to point to the grown block. Then set arr[3]=4; arr[4]=5;",
    "arr = (int *)realloc(arr, 5 * sizeof(int));\narr[3] = 4; arr[4] = 5;\nfor (int i = 0; i < 5; i++) {\n    if (i > 0) printf(\" \");\n    printf(\"%d\", arr[i]);\n}\nprintf(\"\\n\");"
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_05"
title           = "Heap-Allocated Strings"
prompt          = """Strings on the heap allow runtime-length strings and mutation. Allocate memory for "hello" (6 bytes: 5 chars + null terminator), copy the string in, print it, then convert to uppercase and print again. Print:
Original: hello
Modified: HELLO"""
expected_output = """Original: hello
Modified: HELLO"""
starter_code    = """#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <ctype.h>

int main() {
    char *s = (char *)malloc(6 * sizeof(char));
    strcpy(s, "hello");
    printf("Original: %s\n", s);
    // Convert s to uppercase in place
    printf("Modified: %s\n", s);
    free(s);
    return 0;
}"""
hints = [
    "Loop over each character: s[i] = toupper(s[i]); Use strlen(s) or the known length 5.",
    "for (int i = 0; i < (int)strlen(s); i++) s[i] = toupper(s[i]);"
]
validation_mode = "exact_stdout"
