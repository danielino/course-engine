id          = "26-capstone"
title       = "Capstone Project"
description = "Combine everything: grade calculation, linked lists, word frequency counting, and a stack data structure."

[[exercises]]
id              = "ex_01"
title           = "Student Grade Calculator"
prompt          = """This exercise combines structs, arrays, conditionals, loops, and formatted output. Define a Student struct with a name and score. Assign letter grades (A>=90, B>=80, C>=70, D>=60, F otherwise) and compute the overall average. Print each student's grade and the final average:
Alice: 85 -> B
Bob: 92 -> A
Carol: 78 -> C
Average: 85.00"""
expected_output = """Alice: 85 -> B
Bob: 92 -> A
Carol: 78 -> C
Average: 85.00"""
starter_code    = """#include <stdio.h>
#include <string.h>

typedef struct {
    char name[50];
    int  score;
} Student;

char grade(int score) {
    if (score >= 90) return 'A';
    if (score >= 80) return 'B';
    if (score >= 70) return 'C';
    if (score >= 60) return 'D';
    return 'F';
}

int main() {
    Student students[] = {{"Alice", 85}, {"Bob", 92}, {"Carol", 78}};
    int n = 3;
    int total = 0;
    for (int i = 0; i < n; i++) {
        printf("%s: %d -> %c\n", students[i].name, students[i].score, grade(students[i].score));
        total += students[i].score;
    }
    printf("Average: %.2f\n", (double)total / n);
    return 0;
}"""
hints = [
    "The starter code is nearly complete. Fill in the grade() function and the averaging logic.",
    "The grade() function uses if/else-if. The average is (double)total / n, printed with %.2f."
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "Singly Linked List"
prompt          = """A linked list is a dynamic data structure where each node holds a value and a pointer to the next node. Unlike arrays, nodes don't need to be contiguous in memory. Push values 1, 2, 3 onto a list (each push prepends) and print them forward (which means they'll print in insertion order if you append, or reversed if you prepend — so push to the tail). Print: 1 -> 2 -> 3 -> NULL"""
expected_output = "1 -> 2 -> 3 -> NULL"
starter_code    = """#include <stdio.h>
#include <stdlib.h>

typedef struct Node {
    int         value;
    struct Node *next;
} Node;

Node *push_back(Node *head, int val) {
    Node *new_node = (Node *)malloc(sizeof(Node));
    new_node->value = val;
    new_node->next  = NULL;
    if (head == NULL) return new_node;
    Node *cur = head;
    while (cur->next != NULL) cur = cur->next;
    cur->next = new_node;
    return head;
}

void print_list(Node *head) {
    // Print: val -> val -> ... -> NULL
}

int main() {
    Node *list = NULL;
    list = push_back(list, 1);
    list = push_back(list, 2);
    list = push_back(list, 3);
    print_list(list);
    return 0;
}"""
hints = [
    "In print_list, walk the list with a while loop. For each node print value then \" -> \". At the end print \"NULL\".",
    "void print_list(Node *head) {\n    Node *cur = head;\n    while (cur != NULL) {\n        printf(\"%d -> \", cur->value);\n        cur = cur->next;\n    }\n    printf(\"NULL\\n\");\n}"
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Word Frequency Counter"
prompt          = """Count how many times each unique word appears in a string. This combines string tokenization (strtok), struct arrays, and linear search. Count word frequencies in "hello world hello" and print each word with its count:
hello: 2
world: 1"""
expected_output = """hello: 2
world: 1"""
starter_code    = """#include <stdio.h>
#include <string.h>

typedef struct {
    char word[50];
    int  count;
} WordCount;

int main() {
    char text[] = "hello world hello";
    WordCount freq[50];
    int size = 0;

    char *token = strtok(text, " ");
    while (token != NULL) {
        int found = 0;
        for (int i = 0; i < size; i++) {
            if (strcmp(freq[i].word, token) == 0) {
                freq[i].count++;
                found = 1;
                break;
            }
        }
        if (!found) {
            strcpy(freq[size].word, token);
            freq[size].count = 1;
            size++;
        }
        token = strtok(NULL, " ");
    }

    for (int i = 0; i < size; i++) {
        printf("%s: %d\n", freq[i].word, freq[i].count);
    }
    return 0;
}"""
hints = [
    "The starter code is complete. strtok splits the text; the inner loop searches for an existing entry; if not found, a new entry is created.",
    "The code is correct as written. Run it to verify."
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Stack Data Structure"
prompt          = """A stack is a LIFO (Last In, First Out) data structure. push() adds to the top; pop() removes from the top; peek() reads the top without removing it. Implement a stack backed by an array. Push 1, 2, 3; print the top; pop; print the top again. Print:
Pushed: 1 2 3
Top: 3
After pop top: 2"""
expected_output = """Pushed: 1 2 3
Top: 3
After pop top: 2"""
starter_code    = """#include <stdio.h>

#define STACK_MAX 100

typedef struct {
    int data[STACK_MAX];
    int top;
} Stack;

void stack_init(Stack *s)      { s->top = -1; }
void stack_push(Stack *s, int v) { s->data[++s->top] = v; }
int  stack_pop(Stack *s)       { return s->data[s->top--]; }
int  stack_peek(Stack *s)      { return s->data[s->top]; }

int main() {
    Stack s;
    stack_init(&s);
    stack_push(&s, 1);
    stack_push(&s, 2);
    stack_push(&s, 3);
    printf("Pushed: 1 2 3\n");
    printf("Top: %d\n", stack_peek(&s));
    stack_pop(&s);
    printf("After pop top: %d\n", stack_peek(&s));
    return 0;
}"""
hints = [
    "The starter code is complete. top starts at -1 (empty). push increments top then stores; pop returns data[top] then decrements.",
    "The code is correct as written. stack_peek reads data[top] without changing top."
]
validation_mode = "exact_stdout"
