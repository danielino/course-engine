id          = "22-concurrency"
title       = "Concurrency — Threads, Arc, Mutex"
description = "Spawn OS threads, share data safely with Arc<Mutex<T>>, and collect results with JoinHandle."

[[exercises]]
id              = "ex_01"
title           = "Spawn a thread"
prompt          = """
Spawn a thread that prints:
    hello from thread

Join the thread in `main` before exiting.

Expected output:
    hello from thread
"""
expected_output = "hello from thread"
starter_code    = """
use std::thread;

fn main() {
    let handle = thread::spawn(|| {
        // print the message
    });
    handle.join().unwrap();
}
"""
hints = [
    "println!(\"hello from thread\");  inside the closure.",
]

[[exercises]]
id              = "ex_02"
title           = "move into a thread"
prompt          = """
Create `let s = String::from(\"owned by thread\")`.
Use `move` to capture it into a spawned thread.
Have the thread print it, then join.

Expected output:
    owned by thread
"""
expected_output = "owned by thread"
starter_code    = """
use std::thread;

fn main() {
    let s = String::from("owned by thread");
    let handle = thread::spawn(move || {
        println!("{}", s);
    });
    handle.join().unwrap();
}
"""
hints = [
    "move || { println!(\"{}\", s); }  — move takes ownership of s.",
]

[[exercises]]
id              = "ex_03"
title           = "Arc for shared read-only data"
prompt          = """
Create `Arc::new(vec![1, 2, 3, 4, 5])`.
Clone the Arc into a spawned thread.
Have the thread compute the sum and print it, then join.

Expected output:
    15
"""
expected_output = "15"
starter_code    = """
use std::sync::Arc;
use std::thread;

fn main() {
    let data = Arc::new(vec![1, 2, 3, 4, 5]);
    let data2 = Arc::clone(&data);
    let handle = thread::spawn(move || {
        // sum data2 and print
    });
    handle.join().unwrap();
}
"""
hints = [
    "let sum: i32 = data2.iter().sum();",
    "println!(\"{}\", sum);",
]

[[exercises]]
id              = "ex_04"
title           = "Mutex for shared mutation"
prompt          = """
Use `Arc<Mutex<i32>>` to share a counter between 4 threads.
Each thread increments the counter by 1.
Join all threads and print the final value.

Expected output:
    4
"""
expected_output = "4"
starter_code    = """
use std::sync::{Arc, Mutex};
use std::thread;

fn main() {
    let counter = Arc::new(Mutex::new(0i32));
    let mut handles = vec![];

    for _ in 0..4 {
        let c = Arc::clone(&counter);
        let h = thread::spawn(move || {
            // lock and increment
        });
        handles.push(h);
    }

    for h in handles {
        h.join().unwrap();
    }

    println!("{}", *counter.lock().unwrap());
}
"""
hints = [
    "let mut val = c.lock().unwrap();",
    "*val += 1;",
]

[[exercises]]
id              = "ex_05"
title           = "JoinHandle return values"
prompt          = """
Spawn 3 threads where each thread `i` (0, 1, 2) returns `i * i`.
Collect the results, sort them, and print space-separated.

Expected output:
    0 1 4
"""
expected_output = "0 1 4"
starter_code    = """
use std::thread;

fn main() {
    let handles: Vec<_> = (0..3usize).map(|i| {
        thread::spawn(move || i * i)
    }).collect();

    let mut results: Vec<usize> = handles.into_iter()
        .map(|h| h.join().unwrap())
        .collect();

    results.sort();
    let s: Vec<String> = results.iter().map(|x| x.to_string()).collect();
    println!("{}", s.join(" "));
}
"""
hints = [
    "thread::spawn returns a JoinHandle<T>; .join().unwrap() gets the T.",
    "The starter code is nearly complete — just make sure the pieces fit.",
]
