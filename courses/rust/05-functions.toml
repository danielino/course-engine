id          = "05-functions"
title       = "Functions"
description = "Define functions, pass parameters, return values, and understand how expressions differ from statements."

[[exercises]]
id              = "ex_01"
title           = "Define and call a function"
prompt          = """
Write a function called `greet` that prints:
    Hello from a function!

Call it from `main`.
"""
expected_output = "Hello from a function!"
starter_code    = """
fn main() {
    // call greet() here
}

// define greet() here
"""
hints = [
    "fn greet() { println!(\"Hello from a function!\"); }",
]

[[exercises]]
id              = "ex_02"
title           = "Function parameters"
prompt          = """
Write a function `add(a: i32, b: i32)` that prints:
    sum = <result>

Call it with `3` and `7`.

Expected output:
    sum = 10
"""
expected_output = "sum = 10"
starter_code    = """
fn main() {
    add(3, 7);
}

fn add(a: i32, b: i32) {
    // print the sum
}
"""
hints = [
    "println!(\"sum = {}\", a + b);",
]

[[exercises]]
id              = "ex_03"
title           = "Return values"
prompt          = """
Write a function `square(n: i32) -> i32` that returns `n * n`.
Call it with `9` and print the result.

Expected output:
    81
"""
expected_output = "81"
starter_code    = """
fn main() {
    println!("{}", square(9));
}

fn square(n: i32) -> i32 {
    // return n * n
}
"""
hints = [
    "In Rust the last expression in a function body is returned automatically — no `return` keyword needed.",
    "n * n  (without a semicolon) is an expression that becomes the return value.",
]

[[exercises]]
id              = "ex_04"
title           = "if as an expression"
prompt          = """
Write `fn max(a: i32, b: i32) -> i32` that returns the larger of the two values.
Use an `if` expression — no `return` keyword.

Call `max(4, 7)` and print the result.

Expected output:
    7
"""
expected_output = "7"
starter_code    = """
fn main() {
    println!("{}", max(4, 7));
}

fn max(a: i32, b: i32) -> i32 {
    // use if/else as an expression
}
"""
hints = [
    "if a > b { a } else { b }  — this whole block is an expression with value a or b.",
]

[[exercises]]
id              = "ex_05"
title           = "Multiple return paths"
prompt          = """
Write `fn classify(n: i32) -> &'static str` that returns:
  - \"negative\" if n < 0
  - \"zero\"     if n == 0
  - \"positive\" if n > 0

Print the results for `-3`, `0`, and `5` — one per line.

Expected output:
    negative
    zero
    positive
"""
expected_output = "negative\nzero\npositive"
starter_code    = """
fn main() {
    println!("{}", classify(-3));
    println!("{}", classify(0));
    println!("{}", classify(5));
}

fn classify(n: i32) -> &'static str {
    // return the right string
}
"""
hints = [
    "Use if / else if / else.",
    "&'static str means a string literal that lives for the whole program — perfect for returning \"negative\", \"zero\", \"positive\".",
]
