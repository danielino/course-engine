id          = "19-modules"
title       = "Modules"
description = "Organize code into mod blocks, control visibility with pub, and import items with use."

[[exercises]]
id              = "ex_01"
title           = "Declare a module"
prompt          = """
Define `mod greetings` containing a public function `hello() -> &'static str` that returns `"hello"`.
Call `greetings::hello()` from `main` and print the result.

Expected output:
    hello
"""
expected_output = "hello"
starter_code    = """
mod greetings {
    pub fn hello() -> &'static str {
        // return "hello"
        todo!()
    }
}

fn main() {
    println!("{}", greetings::hello());
}
"""
hints = [
    "\"hello\"  — just return the string literal.",
]

[[exercises]]
id              = "ex_02"
title           = "Nested modules"
prompt          = """
Create `mod outer { pub mod inner { ... } }` where `inner` has a public function `msg() -> &'static str` returning `"deep"`.
Call `outer::inner::msg()` and print it.

Expected output:
    deep
"""
expected_output = "deep"
starter_code    = """
mod outer {
    pub mod inner {
        pub fn msg() -> &'static str {
            // return "deep"
            todo!()
        }
    }
}

fn main() {
    println!("{}", outer::inner::msg());
}
"""
hints = [
    "\"deep\"",
]

[[exercises]]
id              = "ex_03"
title           = "use keyword"
prompt          = """
Using the same `outer::inner::msg` function, bring it into scope with `use` and call it without the full path.

Expected output:
    deep
"""
expected_output = "deep"
starter_code    = """
mod outer {
    pub mod inner {
        pub fn msg() -> &'static str { "deep" }
    }
}

// use outer::inner::msg here

fn main() {
    println!("{}", msg());
}
"""
hints = [
    "use outer::inner::msg;  — at the top of the file, outside main.",
]

[[exercises]]
id              = "ex_04"
title           = "Private helpers"
prompt          = """
Define `mod math` with:
  - A private function `double(n: i32) -> i32`
  - A public function `square(n: i32) -> i32` that returns `double(n) * n / 2 * 2` (just use `n * n`)

Call `math::square(7)` and print the result.

Expected output:
    49
"""
expected_output = "49"
starter_code    = """
mod math {
    fn double(n: i32) -> i32 {
        n * 2
    }

    pub fn square(n: i32) -> i32 {
        // use the private double helper — or just n * n
        todo!()
    }
}

fn main() {
    println!("{}", math::square(7));
}
"""
hints = [
    "n * n  — the simplest correct answer.",
    "Private items are accessible within their own module but not outside it.",
]
