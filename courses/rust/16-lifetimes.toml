id          = "16-lifetimes"
title       = "Lifetimes"
description = "Annotate lifetimes to tell the compiler how long references stay valid."

[[exercises]]
id              = "ex_01"
title           = "Lifetime annotations on functions"
prompt          = """
Write `fn longest<'a>(x: &'a str, y: &'a str) -> &'a str` that returns the longer string.

Call it with `"hello"` and `"hi"` and print the result.

Expected output:
    hello
"""
expected_output = "hello"
starter_code    = """
fn longest<'a>(x: &'a str, y: &'a str) -> &'a str {
    // return the longer string
    todo!()
}

fn main() {
    let result = longest("hello", "hi");
    println!("{}", result);
}
"""
hints = [
    "if x.len() >= y.len() { x } else { y }",
]

[[exercises]]
id              = "ex_02"
title           = "Lifetime in a struct"
prompt          = """
Define `struct Excerpt<'a> { text: &'a str }`.
Create a `String`, take a slice of it, store it in an `Excerpt`, and print `excerpt.text`.

The slice to store is the first sentence: `"first sentence"`.

Expected output:
    first sentence
"""
expected_output = "first sentence"
starter_code    = """
struct Excerpt<'a> {
    text: &'a str,
}

fn main() {
    let s = String::from("first sentence. second sentence.");
    // take the slice up to the first '.' and store in Excerpt
    // print excerpt.text
}
"""
hints = [
    "Find the dot position: let dot = s.find('.').unwrap();",
    "let excerpt = Excerpt { text: &s[..dot] };",
]

[[exercises]]
id              = "ex_03"
title           = "'static lifetime"
prompt          = """
Declare a `&'static str` string literal `"I live forever"` and print it.

Expected output:
    I live forever
"""
expected_output = "I live forever"
starter_code    = """
fn main() {
    let s: &'static str = "I live forever";
    println!("{}", s);
}
"""
hints = [
    "String literals always have the 'static lifetime.",
]

[[exercises]]
id              = "ex_04"
title           = "Lifetime elision"
prompt          = """
Write `fn first_word(s: &str) -> &str` (no explicit lifetime annotation needed) that returns the substring before the first space.

Call it with `"hello world"` and print the result.

Expected output:
    hello
"""
expected_output = "hello"
starter_code    = """
fn first_word(s: &str) -> &str {
    // return everything before the first space
    todo!()
}

fn main() {
    println!("{}", first_word("hello world"));
}
"""
hints = [
    "let space = s.find(' ').unwrap_or(s.len());",
    "&s[..space]",
]
