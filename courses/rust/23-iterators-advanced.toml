id          = "23-iterators-advanced"
title       = "Custom Iterators and Advanced Combinators"
description = "Implement the Iterator trait on your own types and compose complex pipelines."

[[exercises]]
id              = "ex_01"
title           = "Implement Iterator"
prompt          = """
Define `struct Counter { count: u32, max: u32 }`.
Implement `Iterator` for it so it yields `1, 2, ..., max` and then stops.

Collect `Counter { count: 0, max: 5 }` and print the sum.

Expected output:
    15
"""
expected_output = "15"
starter_code    = """
struct Counter {
    count: u32,
    max: u32,
}

impl Iterator for Counter {
    type Item = u32;

    fn next(&mut self) -> Option<Self::Item> {
        // increment count, return Some(count) if <= max, else None
        todo!()
    }
}

fn main() {
    let sum: u32 = Counter { count: 0, max: 5 }.sum();
    println!("{}", sum);
}
"""
hints = [
    "self.count += 1;",
    "if self.count <= self.max { Some(self.count) } else { None }",
]

[[exercises]]
id              = "ex_02"
title           = "take and skip"
prompt          = """
Use `(1..).skip(4).take(3)` to get the numbers `[5, 6, 7]`.
Print their sum.

Expected output:
    18
"""
expected_output = "18"
starter_code    = """
fn main() {
    let sum: u32 = (1u32..).skip(4).take(3).sum();
    println!("{}", sum);
}
"""
hints = [
    "skip(4) skips the first 4 elements (1,2,3,4), take(3) then takes the next 3 (5,6,7).",
]

[[exercises]]
id              = "ex_03"
title           = "chain and map"
prompt          = """
Chain `[1, 2, 3]` and `[4, 5, 6]`, double each element, collect, and print space-separated.

Expected output:
    2 4 6 8 10 12
"""
expected_output = "2 4 6 8 10 12"
starter_code    = """
fn main() {
    let a = [1, 2, 3];
    let b = [4, 5, 6];
    let result: Vec<i32> = a.iter().chain(b.iter()).map(|&x| x * 2).collect();
    let s: Vec<String> = result.iter().map(|x| x.to_string()).collect();
    println!("{}", s.join(" "));
}
"""
hints = [
    "chain() joins two iterators end-to-end.",
]

[[exercises]]
id              = "ex_04"
title           = "scan — running totals"
prompt          = """
Use `.scan(0, |acc, x| { *acc += x; Some(*acc) })` on `1..=4` to produce running sums.
Collect and print space-separated.

Expected output:
    1 3 6 10
"""
expected_output = "1 3 6 10"
starter_code    = """
fn main() {
    let running: Vec<i32> = (1..=4)
        .scan(0, |acc, x| {
            *acc += x;
            Some(*acc)
        })
        .collect();
    let s: Vec<String> = running.iter().map(|x| x.to_string()).collect();
    println!("{}", s.join(" "));
}
"""
hints = [
    "scan carries state (like fold) but yields a value at each step instead of at the end.",
]

[[exercises]]
id              = "ex_05"
title           = "partition"
prompt          = """
Partition `1..=10` into evens and odds using `.partition(|x| x % 2 == 0)`.
Print the count of evens, then the count of odds — one per line.

Expected output:
    5
    5
"""
expected_output = "5\n5"
starter_code    = """
fn main() {
    let (evens, odds): (Vec<i32>, Vec<i32>) = (1..=10).partition(|x| x % 2 == 0);
    println!("{}", evens.len());
    println!("{}", odds.len());
}
"""
hints = [
    "partition returns a tuple of two collections — the first contains elements for which the closure returns true.",
]
