id          = "10-option"
title       = "Option<T>"
description = "Rust has no null. Use Option<T> to represent values that may or may not exist."

[[exercises]]
id              = "ex_01"
title           = "Return Some or None"
prompt          = """
Write `fn first_even(nums: &[i32]) -> Option<i32>` that returns the first even number in the slice, or `None` if there isn't one.

Call it on `[1, 3, 4, 7]`, unwrap the result, and print it.

Expected output:
    4
"""
expected_output = "4"
starter_code    = """
fn first_even(nums: &[i32]) -> Option<i32> {
    // iterate, return Some(n) for the first even, None if none found
    todo!()
}

fn main() {
    let result = first_even(&[1, 3, 4, 7]);
    println!("{}", result.unwrap());
}
"""
hints = [
    "for &n in nums { if n % 2 == 0 { return Some(n); } }",
    "Return None at the end if nothing was found.",
]

[[exercises]]
id              = "ex_02"
title           = "unwrap_or fallback"
prompt          = """
Call `first_even` on `[1, 3, 5]` (no even numbers).
Use `.unwrap_or(0)` to provide a fallback and print it.

Expected output:
    0
"""
expected_output = "0"
starter_code    = """
fn first_even(nums: &[i32]) -> Option<i32> {
    for &n in nums {
        if n % 2 == 0 { return Some(n); }
    }
    None
}

fn main() {
    let result = first_even(&[1, 3, 5]);
    // use unwrap_or and print
}
"""
hints = [
    "result.unwrap_or(0) returns 0 if result is None.",
]

[[exercises]]
id              = "ex_03"
title           = "map on Option"
prompt          = """
Start with `Some(5i32)`.
Use `.map(|x| x * 2)` to double the inner value.
Unwrap and print the result.

Expected output:
    10
"""
expected_output = "10"
starter_code    = """
fn main() {
    let x: Option<i32> = Some(5);
    // map to double, then unwrap and print
}
"""
hints = [
    "x.map(|n| n * 2).unwrap()",
    "map transforms the value inside Some without touching None.",
]

[[exercises]]
id              = "ex_04"
title           = "and_then chaining"
prompt          = """
Write `fn parse_positive(s: &str) -> Option<u32>` that:
  - Parses `s` as `u32`
  - Returns `None` if parsing fails or the number is 0
  - Returns `Some(n)` otherwise

Chain: `parse_positive("3").and_then(|n| Some(n + 1))` and print.

Expected output:
    4
"""
expected_output = "4"
starter_code    = """
fn parse_positive(s: &str) -> Option<u32> {
    // parse and check for zero
    todo!()
}

fn main() {
    let result = parse_positive("3").and_then(|n| Some(n + 1));
    println!("{}", result.unwrap());
}
"""
hints = [
    "s.parse::<u32>().ok() converts a Result to an Option.",
    "Use .and_then(|n| if n == 0 { None } else { Some(n) }) to filter zero.",
]

[[exercises]]
id              = "ex_05"
title           = "? operator in Option-returning functions"
prompt          = """
Write `fn double_first(v: &[&str]) -> Option<i32>` that:
  - Gets the first element with `v.first()?`
  - Parses it as i32 with `.parse::<i32>().ok()?`
  - Returns `Some(value * 2)`

Call it with `["5", "abc"]` and print.

Expected output:
    10
"""
expected_output = "10"
starter_code    = """
fn double_first(v: &[&str]) -> Option<i32> {
    // use ? to get first and parse
    todo!()
}

fn main() {
    let result = double_first(&["5", "abc"]);
    println!("{}", result.unwrap());
}
"""
hints = [
    "let first = v.first()?;  — returns None if the slice is empty",
    "let n = first.parse::<i32>().ok()?;  — returns None if parsing fails",
    "Some(n * 2) as the final expression.",
]
