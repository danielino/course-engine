id          = "18-iterators"
title       = "Iterators"
description = "Use Rust's lazy iterator pipeline: map, filter, fold, zip, enumerate, and flat_map."

[[exercises]]
id              = "ex_01"
title           = "map and collect"
prompt          = """
Transform `vec![1, 2, 3]` by multiplying each element by `10`.
Collect into a new Vec and print the elements space-separated.

Expected output:
    10 20 30
"""
expected_output = "10 20 30"
starter_code    = """
fn main() {
    let v = vec![1, 2, 3];
    let result: Vec<i32> = v.iter().map(|&x| x * 10).collect();
    // print space-separated
}
"""
hints = [
    "result.iter().map(|x| x.to_string()).collect::<Vec<_>>().join(\" \")",
]

[[exercises]]
id              = "ex_02"
title           = "filter and count"
prompt          = """
Count how many even numbers are in the range `1..=10`.
Print the count.

Expected output:
    5
"""
expected_output = "5"
starter_code    = """
fn main() {
    let count = (1..=10).filter(|x| x % 2 == 0).count();
    println!("{}", count);
}
"""
hints = [
    "filter keeps elements for which the closure returns true.",
]

[[exercises]]
id              = "ex_03"
title           = "fold"
prompt          = """
Use `fold` to compute the product of `[1, 2, 3, 4, 5]` and print it.

Expected output:
    120
"""
expected_output = "120"
starter_code    = """
fn main() {
    let product = vec![1i64, 2, 3, 4, 5]
        .iter()
        .fold(1, |acc, &x| acc * x);
    println!("{}", product);
}
"""
hints = [
    "fold(initial, |accumulator, element| new_accumulator)",
    "fold(1, |acc, &x| acc * x)  — multiply each element into the accumulator.",
]

[[exercises]]
id              = "ex_04"
title           = "zip"
prompt          = """
Zip `[\"a\", \"b\", \"c\"]` with `[1, 2, 3]`.
Print each pair as `\"a:1\"`, `\"b:2\"`, `\"c:3\"` on separate lines.

Expected output:
    a:1
    b:2
    c:3
"""
expected_output = "a:1\nb:2\nc:3"
starter_code    = """
fn main() {
    let letters = ["a", "b", "c"];
    let numbers = [1, 2, 3];
    for (l, n) in letters.iter().zip(numbers.iter()) {
        println!("{}:{}", l, n);
    }
}
"""
hints = [
    "zip combines two iterators into an iterator of (a, b) pairs.",
]

[[exercises]]
id              = "ex_05"
title           = "flat_map"
prompt          = """
Given `vec![\"hello world\", \"foo bar\"]`, use `flat_map(str::split_whitespace)` to get all words.
Collect into a `Vec<&str>` and print its length.

Expected output:
    4
"""
expected_output = "4"
starter_code    = """
fn main() {
    let sentences = vec!["hello world", "foo bar"];
    let words: Vec<&str> = sentences.iter()
        .flat_map(|s| s.split_whitespace())
        .collect();
    println!("{}", words.len());
}
"""
hints = [
    "flat_map maps each element to an iterator and flattens all those iterators into one.",
]
