id          = "11-result-and-error-handling"
title       = "Result<T, E> and Error Handling"
description = "Use Result for fallible operations, propagate errors with ?, and produce meaningful messages."

[[exercises]]
id              = "ex_01"
title           = "Ok and Err"
prompt          = """
Write `fn divide(a: f64, b: f64) -> Result<f64, String>` that returns:
  - `Err(\"division by zero\")` when `b == 0.0`
  - `Ok(a / b)` otherwise

Call `divide(10.0, 2.0)`, unwrap, and print the integer part.

Expected output:
    5
"""
expected_output = "5"
starter_code    = """
fn divide(a: f64, b: f64) -> Result<f64, String> {
    // return Err or Ok
    todo!()
}

fn main() {
    let result = divide(10.0, 2.0).unwrap();
    println!("{:.0}", result);
}
"""
hints = [
    "if b == 0.0 { return Err(String::from(\"division by zero\")); }",
    "Ok(a / b)",
]

[[exercises]]
id              = "ex_02"
title           = "Handling Err with match"
prompt          = """
Using the same `divide` function, call `divide(10.0, 0.0)` and use `match` to print:
    error: division by zero
"""
expected_output = "error: division by zero"
starter_code    = """
fn divide(a: f64, b: f64) -> Result<f64, String> {
    if b == 0.0 { return Err(String::from("division by zero")); }
    Ok(a / b)
}

fn main() {
    let result = divide(10.0, 0.0);
    match result {
        Ok(v)  => println!("{:.0}", v),
        Err(e) => println!("error: {}", e),
    }
}
"""
hints = [
    "The Err arm already does what you need — just make sure it says \"error: \" before the message.",
]

[[exercises]]
id              = "ex_03"
title           = "The ? operator"
prompt          = """
Write `fn parse_and_double(s: &str) -> Result<i32, std::num::ParseIntError>` that:
  - Parses `s` as `i32` using `?`
  - Returns `Ok(value * 2)`

In `main`, call it with `\"42\"` and print the result.

Expected output:
    84
"""
expected_output = "84"
starter_code    = """
fn parse_and_double(s: &str) -> Result<i32, std::num::ParseIntError> {
    // parse s and double it, using ?
    todo!()
}

fn main() {
    match parse_and_double("42") {
        Ok(n)  => println!("{}", n),
        Err(e) => println!("error: {}", e),
    }
}
"""
hints = [
    "let n = s.parse::<i32>()?;",
    "Ok(n * 2)",
]

[[exercises]]
id              = "ex_04"
title           = "unwrap_or_else"
prompt          = """
Try to parse `\"abc\"` as an `i32`.
Use `.unwrap_or_else(|_| -1)` to return `-1` on failure, and print it.

Expected output:
    -1
"""
expected_output = "-1"
starter_code    = """
fn main() {
    let n = "abc".parse::<i32>().unwrap_or_else(|_| -1);
    println!("{}", n);
}
"""
hints = [
    "The closure |_| -1 ignores the error and always returns -1.",
]

[[exercises]]
id              = "ex_05"
title           = "Custom error type"
prompt          = """
Define:
    enum AppError { NegativeNumber }

Write `fn check_positive(n: i32) -> Result<i32, AppError>` that returns:
  - `Err(AppError::NegativeNumber)` for negative values
  - `Ok(n)` otherwise

Call it with `-5`, match on the error, and print:
    negative number
"""
expected_output = "negative number"
starter_code    = """
enum AppError {
    NegativeNumber,
}

fn check_positive(n: i32) -> Result<i32, AppError> {
    // return Err or Ok
    todo!()
}

fn main() {
    match check_positive(-5) {
        Ok(n)                       => println!("{}", n),
        Err(AppError::NegativeNumber) => println!("negative number"),
    }
}
"""
hints = [
    "if n < 0 { return Err(AppError::NegativeNumber); }",
]
