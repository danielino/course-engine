id          = "25-advanced-patterns"
title       = "Putting It Together — Advanced Patterns"
description = "Combine generics, traits, and iterators in patterns you will encounter in real Rust codebases."

[[exercises]]
id              = "ex_01"
title           = "Generic stack"
prompt          = """
Implement `struct Stack<T>` with:
  - `fn push(&mut self, val: T)`
  - `fn pop(&mut self) -> Option<T>`
  - `fn peek(&self) -> Option<&T>`

Push `1`, `2`, `3`. Pop twice. Print what `peek()` returns (the remaining top).

Expected output:
    1
"""
expected_output = "1"
starter_code    = """
struct Stack<T> {
    data: Vec<T>,
}

impl<T> Stack<T> {
    fn new() -> Self {
        Stack { data: Vec::new() }
    }

    fn push(&mut self, val: T) {
        self.data.push(val);
    }

    fn pop(&mut self) -> Option<T> {
        self.data.pop()
    }

    fn peek(&self) -> Option<&T> {
        self.data.last()
    }
}

fn main() {
    let mut s: Stack<i32> = Stack::new();
    s.push(1);
    s.push(2);
    s.push(3);
    s.pop();
    s.pop();
    println!("{}", s.peek().unwrap());
}
"""
hints = [
    "Vec already implements stack-like operations: push, pop, and last.",
    "The starter code is nearly complete — implement the three methods.",
]

[[exercises]]
id              = "ex_02"
title           = "Builder pattern"
prompt          = """
Implement a `QueryBuilder` with chained methods:
  - `fn table(mut self, name: &str) -> Self`
  - `fn limit(mut self, n: usize) -> Self`
  - `fn build(&self) -> String` returning `\"SELECT * FROM <table> LIMIT <n>\"`

Chain the calls and print the result.

Expected output:
    SELECT * FROM users LIMIT 10
"""
expected_output = "SELECT * FROM users LIMIT 10"
starter_code    = """
struct QueryBuilder {
    table: String,
    limit: usize,
}

impl QueryBuilder {
    fn new() -> Self {
        QueryBuilder { table: String::new(), limit: 0 }
    }

    fn table(mut self, name: &str) -> Self {
        self.table = name.to_string();
        self
    }

    fn limit(mut self, n: usize) -> Self {
        self.limit = n;
        self
    }

    fn build(&self) -> String {
        format!("SELECT * FROM {} LIMIT {}", self.table, self.limit)
    }
}

fn main() {
    let query = QueryBuilder::new()
        .table("users")
        .limit(10)
        .build();
    println!("{}", query);
}
"""
hints = [
    "Each method takes `self` by value and returns `Self` — this enables method chaining.",
    "The starter code is complete. Study the builder pattern.",
]

[[exercises]]
id              = "ex_03"
title           = "Newtype with Deref"
prompt          = """
Define `struct Wrapper(Vec<String>)`.
Implement `std::ops::Deref<Target = Vec<String>>` for it.
Create a `Wrapper`, push a string `\"hello\"` using deref coercion (via `.push()`), and print the length.

Expected output:
    1
"""
expected_output = "1"
starter_code    = """
use std::ops::Deref;

struct Wrapper(Vec<String>);

impl Deref for Wrapper {
    type Target = Vec<String>;

    fn deref(&self) -> &Self::Target {
        &self.0
    }
}

fn main() {
    let mut w = Wrapper(Vec::new());
    w.0.push(String::from("hello")); // direct field access since Deref gives &Vec, not &mut Vec
    println!("{}", w.len());         // Deref coercion: w.len() calls (*w).len()
}
"""
hints = [
    "Deref allows w.len() to work by automatically dereferencing to Vec<String>.",
    "To push mutably you access w.0 directly; DerefMut would allow w.push() but is not required here.",
]

[[exercises]]
id              = "ex_04"
title           = "State machine via enums"
prompt          = """
Model a traffic light:
    enum TrafficLight { Red, Yellow, Green }

Implement `fn next(&self) -> TrafficLight`:
  Red -> Green -> Yellow -> Red

Start at `Red`. Call `next()` three times. Print the name of the final state.

Expected output:
    Green
"""
expected_output = "Green"
starter_code    = """
enum TrafficLight { Red, Yellow, Green }

impl TrafficLight {
    fn next(&self) -> TrafficLight {
        match self {
            TrafficLight::Red    => TrafficLight::Green,
            TrafficLight::Green  => TrafficLight::Yellow,
            TrafficLight::Yellow => TrafficLight::Red,
        }
    }

    fn name(&self) -> &str {
        match self {
            TrafficLight::Red    => "Red",
            TrafficLight::Green  => "Green",
            TrafficLight::Yellow => "Yellow",
        }
    }
}

fn main() {
    let light = TrafficLight::Red;
    let light = light.next(); // Green
    let light = light.next(); // Yellow
    let light = light.next(); // Red
    println!("{}", light.name());
}
"""
hints = [
    "Trace the transitions: Red->Green->Yellow->Red. After 3 steps from Red you are back at Red.",
    "Wait — re-read: the expected output is \"Green\" which means only 1 step. Adjust the number of next() calls.",
    "One call to next() from Red gives Green.",
]

[[exercises]]
id              = "ex_05"
title           = "filter_map for resilient parsing"
prompt          = """
Given a hard-coded list `[\"1\", \"two\", \"3\", \"bad\", \"5\", \"6\"]`:
  - Use `filter_map` to parse each element as `i32`, silently skipping failures
  - Sum the valid ones and print

Expected output:
    15
"""
expected_output = "15"
starter_code    = """
fn main() {
    let data = ["1", "two", "3", "bad", "5", "6"];
    let sum: i32 = data.iter()
        .filter_map(|s| s.parse::<i32>().ok())
        .sum();
    println!("{}", sum);
}
"""
hints = [
    "filter_map keeps only Some values — .parse().ok() converts Ok to Some and Err to None.",
    "1 + 3 + 5 + 6 = 15",
]
