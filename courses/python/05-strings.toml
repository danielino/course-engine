id          = "05-strings"
title       = "Strings"
description = "f-strings, len(), slicing, upper/lower, strip, find, and the in operator."

[[exercises]]
id              = "ex_01"
title           = "f-strings"
prompt          = """
f-strings (formatted string literals) let you embed expressions inside strings.
Write them as f"...{expression}...".

Given:
  name = "world"
  year = 2024

Print:
    Hello, world! It is 2024.
"""
expected_output = "Hello, world! It is 2024."
starter_code    = """
name = "world"
year = 2024
print(f"Hello, {name}! It is {year}.")
"""
hints = [
    "Place the variable inside curly braces {} within the f-string.",
    "Run the starter code as-is.",
]

[[exercises]]
id              = "ex_02"
title           = "len() and slicing"
prompt          = """
len(s) returns the number of characters. Slicing gives a substring: s[start:stop].
Indices are zero-based; stop is exclusive.

Given s = "Python":
  1. Print its length.           → 6
  2. Print the first 3 chars.    → Pyt
  3. Print the last 3 chars.     → hon
"""
expected_output = """6
Pyt
hon"""
starter_code    = """
s = "Python"
print(len(s))
print(s[0:3])
print(s[3:])
"""
hints = [
    "s[0:3] gives characters at index 0, 1, 2.",
    "s[3:] means from index 3 to the end.",
    "You can also use s[-3:] for the last 3 characters.",
]

[[exercises]]
id              = "ex_03"
title           = "upper(), lower(), strip()"
prompt          = """
String methods return new strings — they don't modify the original.

Given s = "  Hello, World!  ":
  1. Print s.strip()        (removes surrounding whitespace)
  2. Print s.strip().lower()
  3. Print s.strip().upper()

Expected output:
    Hello, World!
    hello, world!
    HELLO, WORLD!
"""
expected_output = """Hello, World!
hello, world!
HELLO, WORLD!"""
starter_code    = """
s = "  Hello, World!  "
print(s.strip())
print(s.strip().lower())
print(s.strip().upper())
"""
hints = [
    "Method calls can be chained: s.strip().lower().",
    "Run the starter code as-is.",
]

[[exercises]]
id              = "ex_04"
title           = "find() and in"
prompt          = """
s.find(sub) returns the index of the first occurrence of sub, or -1 if not found.
The `in` operator returns True/False.

Given s = "the quick brown fox":
  1. Print s.find("quick")    → 4
  2. Print s.find("cat")      → -1
  3. Print ("fox" in s)       → True
  4. Print ("cat" in s)       → False
"""
expected_output = """4
-1
True
False"""
starter_code    = """
s = "the quick brown fox"
print(s.find("quick"))
print(s.find("cat"))
print("fox" in s)
print("cat" in s)
"""
hints = [
    "find() counts from 0; \"quick\" starts at index 4.",
    "Run the starter code as-is.",
]

[[exercises]]
id              = "ex_05"
title           = "String formatting challenge"
prompt          = """
Combine several string skills: f-strings, upper(), len(), and slicing.

Given:
  word = "python"

Print these four lines:
    PYTHON
    6
    pyt
    hon
"""
expected_output = """PYTHON
6
pyt
hon"""
starter_code    = """
word = "python"
print(word.upper())
print(len(word))
print(word[:3])
print(word[3:])
"""
hints = [
    "word.upper() returns the uppercase version.",
    "word[:3] is equivalent to word[0:3].",
    "Run the starter code as-is.",
]
