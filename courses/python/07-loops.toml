id          = "07-loops"
title       = "Loops"
description = "for with range, while, break, continue, and the else clause on loops."

[[exercises]]
id              = "ex_01"
title           = "for with range()"
prompt          = """
range(start, stop) generates integers from start up to (but not including) stop.

Print the numbers 1 through 5, one per line.

Expected output:
    1
    2
    3
    4
    5
"""
expected_output = """1
2
3
4
5"""
starter_code    = """
for i in range(1, 6):
    print(i)
"""
hints = [
    "range(1, 6) produces 1, 2, 3, 4, 5 — stop is exclusive.",
    "Run the starter code as-is.",
]

[[exercises]]
id              = "ex_02"
title           = "while loop"
prompt          = """
A while loop runs as long as its condition is True.

Use a while loop to print the countdown: 3, 2, 1, Go!, one per line.

Expected output:
    3
    2
    1
    Go!
"""
expected_output = """3
2
1
Go!"""
starter_code    = """
count = 3
while count > 0:
    print(count)
    count -= 1
print("Go!")
"""
hints = [
    "count -= 1 is shorthand for count = count - 1.",
    "The loop exits when count reaches 0, then \"Go!\" is printed after.",
]

[[exercises]]
id              = "ex_03"
title           = "break and continue"
prompt          = """
`break` exits the loop immediately.
`continue` skips the rest of the current iteration and moves to the next.

Print numbers from 1 to 10, but:
  - skip 5 (use continue)
  - stop at 8 (use break)

Expected output:
    1
    2
    3
    4
    6
    7
    8
"""
expected_output = """1
2
3
4
6
7
8"""
starter_code    = """
for i in range(1, 11):
    if i == 5:
        continue
    if i == 8:
        print(i)
        break
    print(i)
"""
hints = [
    "continue jumps back to the top of the loop without running the rest of the body.",
    "break exits the loop. Print 8 before breaking so it appears in the output.",
]

[[exercises]]
id              = "ex_04"
title           = "Loop accumulator"
prompt          = """
A common pattern: start with a variable at 0, add to it inside a loop.

Compute the sum of numbers from 1 to 10 using a for loop and print the result.

Expected output:
    55
"""
expected_output = "55"
starter_code    = """
total = 0
for i in range(1, 11):
    total += i
print(total)
"""
hints = [
    "total += i is shorthand for total = total + i.",
    "1+2+...+10 = 55.",
]

[[exercises]]
id              = "ex_05"
title           = "else clause on a loop"
prompt          = """
A for/while loop can have an else clause that runs only if the loop
completed without hitting a break.

Search for the number 7 in [1, 3, 5, 9]. If found, print "found 7".
If not found (loop finishes without break), print "7 not found".

Expected output:
    7 not found
"""
expected_output = "7 not found"
starter_code    = """
numbers = [1, 3, 5, 9]
for n in numbers:
    if n == 7:
        print("found 7")
        break
else:
    print("7 not found")
"""
hints = [
    "The else block after a for loop runs only if the loop was not exited by break.",
    "Since 7 is not in the list, no break occurs, so the else runs.",
]
