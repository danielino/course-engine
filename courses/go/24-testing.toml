id          = "24-testing"
title       = "Testing Patterns"
description = "Write test-like assertions in main using helper functions, since the runner uses go build not go test."

[[exercises]]
id              = "ex_01"
title           = "Assert helper"
prompt          = """Write an assertEqual(t string, got, want int) helper that prints \"PASS: t\" or \"FAIL: t got X want Y\". Test add(2,3)==5 and add(1,1)==3. Print results."""
expected_output = "PASS: add(2,3)\nFAIL: add(1,1) got 2 want 3\n"
starter_code    = """package main

import "fmt"

func add(a, b int) int { return a + b }

func assertEqual(name string, got, want int) {
	if got == want {
		fmt.Printf("PASS: %s\n", name)
	} else {
		fmt.Printf("FAIL: %s got %d want %d\n", name, got, want)
	}
}

func main() {
	assertEqual("add(2,3)", add(2, 3), 5)
	assertEqual("add(1,1)", add(1, 1), 3)
}
"""
hints           = [
  "The helper compares got and want and prints the appropriate message.",
  "add(1,1) returns 2 but we assert 3, so it prints FAIL.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "Table-driven tests in main"
prompt          = """Run table-driven tests for a square(n int) int function with cases (2→4), (3→9), (4→16). Print PASS or FAIL for each."""
expected_output = "PASS: square(2)\nPASS: square(3)\nPASS: square(4)\n"
starter_code    = """package main

import "fmt"

func square(n int) int { return n * n }

func main() {
	cases := []struct {
		input, want int
	}{
		{2, 4},
		{3, 9},
		{4, 16},
	}
	for _, tc := range cases {
		got := square(tc.input)
		name := fmt.Sprintf("square(%d)", tc.input)
		if got == tc.want {
			fmt.Printf("PASS: %s\n", name)
		} else {
			fmt.Printf("FAIL: %s got %d want %d\n", name, got, tc.want)
		}
	}
}
"""
hints           = [
  "Use an anonymous struct slice to hold (input, want) pairs.",
  "Loop over cases with range and compare got to tc.want.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Testing a string function"
prompt          = """Test reverse(s string) string with inputs \"abc\"→\"cba\" and \"hello\"→\"olleh\". Print PASS or FAIL for each."""
expected_output = "PASS: reverse(abc)\nPASS: reverse(hello)\n"
starter_code    = """package main

import "fmt"

func reverse(s string) string {
	runes := []rune(s)
	for i, j := 0, len(runes)-1; i < j; i, j = i+1, j-1 {
		runes[i], runes[j] = runes[j], runes[i]
	}
	return string(runes)
}

func main() {
	cases := []struct{ input, want string }{
		{"abc", "cba"},
		{"hello", "olleh"},
	}
	for _, tc := range cases {
		got := reverse(tc.input)
		if got == tc.want {
			fmt.Printf("PASS: reverse(%s)\n", tc.input)
		} else {
			fmt.Printf("FAIL: reverse(%s) got %s want %s\n", tc.input, got, tc.want)
		}
	}
}
"""
hints           = [
  "Convert to []rune to correctly handle multi-byte characters.",
  "Swap runes from both ends moving toward the middle.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Testing error-returning functions"
prompt          = """Test parsePositive(s string) (int, error) with \"5\"→(5,nil) and \"-3\"→error. Print PASS or FAIL for each case."""
expected_output = "PASS: parsePositive(5)\nPASS: parsePositive(-3)\n"
starter_code    = """package main

import (
	"errors"
	"fmt"
	"strconv"
)

func parsePositive(s string) (int, error) {
	n, err := strconv.Atoi(s)
	if err != nil {
		return 0, err
	}
	if n <= 0 {
		return 0, errors.New("not positive")
	}
	return n, nil
}

func main() {
	// case 1: "5" should return 5, nil
	n, err := parsePositive("5")
	if n == 5 && err == nil {
		fmt.Println("PASS: parsePositive(5)")
	} else {
		fmt.Println("FAIL: parsePositive(5)")
	}
	// case 2: "-3" should return an error
	_, err = parsePositive("-3")
	if err != nil {
		fmt.Println("PASS: parsePositive(-3)")
	} else {
		fmt.Println("FAIL: parsePositive(-3)")
	}
}
"""
hints           = [
  "Check both the returned value and the error for the happy path.",
  "For the error case, only err != nil matters.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_05"
title           = "Counting PASS and FAIL"
prompt          = """Run 4 tests where 3 pass and 1 fails. Print a summary line: \"3 passed, 1 failed\"."""
expected_output = "3 passed, 1 failed\n"
starter_code    = """package main

import "fmt"

func double(n int) int { return n * 2 }

func main() {
	passed, failed := 0, 0
	check := func(got, want int) {
		if got == want {
			passed++
		} else {
			failed++
		}
	}
	check(double(1), 2)
	check(double(2), 4)
	check(double(3), 6)
	check(double(4), 9) // intentional fail
	fmt.Printf("%d passed, %d failed\n", passed, failed)
}
"""
hints           = [
  "Use closures to capture passed and failed counters.",
  "double(4) = 8, not 9, so that case fails.",
]
validation_mode = "exact_stdout"
