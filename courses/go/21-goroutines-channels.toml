id          = "21-goroutines-channels"
title       = "Goroutines & Channels"
description = "Launch goroutines with go, communicate via channels, and use select for non-blocking ops. All output is deterministic."

[[exercises]]
id              = "ex_01"
title           = "Simple goroutine with channel"
prompt          = """Launch a goroutine that sends the string \"hello from goroutine\" on a channel. Receive and print it in main."""
expected_output = "hello from goroutine\n"
starter_code    = """package main

import "fmt"

func main() {
	ch := make(chan string)
	go func() {
		ch <- "hello from goroutine"
	}()
	msg := <-ch
	fmt.Println(msg)
}
"""
hints           = [
  "make(chan string) creates an unbuffered channel.",
  "The goroutine blocks on ch <- until main receives with msg := <-ch.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "Buffered channel"
prompt          = """Create a buffered channel of capacity 3. Send 1, 2, 3 without a goroutine. Receive and print all three."""
expected_output = "1\n2\n3\n"
starter_code    = """package main

import "fmt"

func main() {
	ch := make(chan int, 3)
	ch <- 1
	ch <- 2
	ch <- 3
	fmt.Println(<-ch)
	fmt.Println(<-ch)
	fmt.Println(<-ch)
}
"""
hints           = [
  "A buffered channel of capacity 3 can hold 3 values without blocking.",
  "Receive in the same order they were sent: 1, 2, 3.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Fan-out with deterministic ordering"
prompt          = """Launch 3 goroutines that each send their index (0, 1, 2) on a channel. Collect all three results into a slice, sort it, and print each on its own line."""
expected_output = "0\n1\n2\n"
starter_code    = """package main

import (
	"fmt"
	"sort"
)

func main() {
	ch := make(chan int, 3)
	for i := 0; i < 3; i++ {
		i := i
		go func() { ch <- i }()
	}
	results := make([]int, 3)
	for i := range results {
		results[i] = <-ch
	}
	sort.Ints(results)
	for _, v := range results {
		fmt.Println(v)
	}
}
"""
hints           = [
  "Shadow i with i := i inside the loop so each goroutine captures its own copy.",
  "Collect results into a slice, sort, then print to get deterministic output.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Range over closed channel"
prompt          = """Send the strings \"a\", \"b\", \"c\" on a channel from a goroutine, close the channel, then range over it and print each value."""
expected_output = "a\nb\nc\n"
starter_code    = """package main

import "fmt"

func main() {
	ch := make(chan string, 3)
	go func() {
		for _, s := range []string{"a", "b", "c"} {
			ch <- s
		}
		close(ch)
	}()
	for v := range ch {
		fmt.Println(v)
	}
}
"""
hints           = [
  "close(ch) signals that no more values will be sent.",
  "for v := range ch receives until the channel is closed and drained.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_05"
title           = "Select with default"
prompt          = """Create an empty channel. Use select with a case on the channel and a default to print \"no message\" when nothing is ready."""
expected_output = "no message\n"
starter_code    = """package main

import "fmt"

func main() {
	ch := make(chan string)
	select {
	case msg := <-ch:
		fmt.Println(msg)
	default:
		fmt.Println("no message")
	}
}
"""
hints           = [
  "An unbuffered channel with no sender is never ready to receive.",
  "The default case in select runs immediately when no other case is ready.",
]
validation_mode = "exact_stdout"
