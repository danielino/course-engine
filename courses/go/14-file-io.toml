id          = "14-file-io"
title       = "File I/O"
description = "Read and write files using os.ReadFile, os.WriteFile, and bufio.Scanner. Always clean up with defer os.Remove."

[[exercises]]
id              = "ex_01"
title           = "Write and read a file"
prompt          = """Write the text \"Hello, file!\" to a temp file, read it back, and print the content."""
expected_output = "Hello, file!\n"
starter_code    = """package main

import (
	"fmt"
	"os"
)

func main() {
	path := "/tmp/course_ex01.txt"
	defer os.Remove(path)
	os.WriteFile(path, []byte("Hello, file!\n"), 0644)
	data, _ := os.ReadFile(path)
	fmt.Print(string(data))
}
"""
hints           = [
  "os.WriteFile(path, data, perm) writes bytes to a file, creating it if needed.",
  "os.ReadFile(path) returns ([]byte, error); convert to string with string(data).",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "Write multiple lines then read"
prompt          = """Write three lines \"alpha\", \"beta\", \"gamma\" to a temp file (one per line), read the file back, and print its contents."""
expected_output = "alpha\nbeta\ngamma\n"
starter_code    = """package main

import (
	"fmt"
	"os"
)

func main() {
	path := "/tmp/course_ex02.txt"
	defer os.Remove(path)
	content := "alpha\nbeta\ngamma\n"
	os.WriteFile(path, []byte(content), 0644)
	data, _ := os.ReadFile(path)
	fmt.Print(string(data))
}
"""
hints           = [
  "Build the content string with newlines: \"alpha\\nbeta\\ngamma\\n\".",
  "os.ReadFile returns the raw bytes; string() converts them for printing.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Line-by-line reading with bufio.Scanner"
prompt          = """Write two lines \"line1\" and \"line2\" to a temp file, then use bufio.Scanner to read and print each line."""
expected_output = "line1\nline2\n"
starter_code    = """package main

import (
	"bufio"
	"fmt"
	"os"
	"strings"
)

func main() {
	path := "/tmp/course_ex03.txt"
	defer os.Remove(path)
	os.WriteFile(path, []byte("line1\nline2\n"), 0644)

	f, _ := os.Open(path)
	defer f.Close()
	scanner := bufio.NewScanner(f)
	for scanner.Scan() {
		fmt.Println(scanner.Text())
	}
	_ = strings.Contains // avoid unused import error
}
"""
hints           = [
  "bufio.NewScanner(f) wraps a file; scanner.Scan() advances to the next line.",
  "scanner.Text() returns the current line without the trailing newline.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Append to a file"
prompt          = """Write \"first\n\" to a temp file, then open it with O_APPEND and write \"second\n\". Read and print the full contents."""
expected_output = "first\nsecond\n"
starter_code    = """package main

import (
	"fmt"
	"os"
)

func main() {
	path := "/tmp/course_ex04.txt"
	defer os.Remove(path)
	os.WriteFile(path, []byte("first\n"), 0644)

	f, _ := os.OpenFile(path, os.O_APPEND|os.O_WRONLY, 0644)
	f.WriteString("second\n")
	f.Close()

	data, _ := os.ReadFile(path)
	fmt.Print(string(data))
}
"""
hints           = [
  "os.OpenFile with os.O_APPEND|os.O_WRONLY opens for appending.",
  "f.WriteString(\"second\\n\") appends without overwriting existing content.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_05"
title           = "Check file existence"
prompt          = """Check whether a non-existent file \"/tmp/course_missing.txt\" exists using os.Stat and errors.Is. Print \"file does not exist\"."""
expected_output = "file does not exist\n"
starter_code    = """package main

import (
	"errors"
	"fmt"
	"os"
)

func main() {
	_, err := os.Stat("/tmp/course_missing.txt")
	if errors.Is(err, os.ErrNotExist) {
		fmt.Println("file does not exist")
	}
}
"""
hints           = [
  "os.Stat returns an error wrapping os.ErrNotExist when the file is absent.",
  "errors.Is(err, os.ErrNotExist) unwraps the error chain to check.",
]
validation_mode = "exact_stdout"
