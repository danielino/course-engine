id          = "07-loops"
title       = "Loops"
description = "Go has only one looping construct: for. Learn its three forms, range, break, and continue."

[[exercises]]
id              = "ex_01"
title           = "Basic for loop"
prompt          = """Print the numbers 1 through 5, each on its own line."""
expected_output = "1\n2\n3\n4\n5\n"
starter_code    = """package main

import "fmt"

func main() {
	// for loop from 1 to 5
}
"""
hints           = [
  "for i := 1; i <= 5; i++ { fmt.Println(i) }",
  "The condition i <= 5 keeps the loop running while true.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_02"
title           = "While-style loop"
prompt          = """Using a for loop with only a condition (no init or post), print the powers of 2 up to 16: 1, 2, 4, 8, 16, each on its own line."""
expected_output = "1\n2\n4\n8\n16\n"
starter_code    = """package main

import "fmt"

func main() {
	n := 1
	// for n <= 16 { ... }
}
"""
hints           = [
  "for n <= 16 { fmt.Println(n); n *= 2 }",
  "Multiply n by 2 at the end of each iteration.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_03"
title           = "Range over a slice"
prompt          = """Given nums := []int{10, 20, 30}, use range to print each value on its own line."""
expected_output = "10\n20\n30\n"
starter_code    = """package main

import "fmt"

func main() {
	nums := []int{10, 20, 30}
	// range loop
}
"""
hints           = [
  "for _, v := range nums { fmt.Println(v) } — use _ to ignore the index.",
  "The blank identifier _ discards the index so the compiler doesn't complain about an unused variable.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_04"
title           = "Continue and break"
prompt          = """Loop from 1 to 10. Skip even numbers with continue. Stop the loop when you reach 7 with break. Print each number that passes both checks."""
expected_output = "1\n3\n5\n"
starter_code    = """package main

import "fmt"

func main() {
	for i := 1; i <= 10; i++ {
		// skip even, break at 7
	}
}
"""
hints           = [
  "Use if i%2 == 0 { continue } to skip even numbers.",
  "Use if i == 7 { break } to exit — check it after the continue so even 7 never prints.",
]
validation_mode = "exact_stdout"

[[exercises]]
id              = "ex_05"
title           = "Nested loops"
prompt          = """Print a 3x3 multiplication table (rows 1-3, columns 1-3) with values separated by spaces and each row on its own line."""
expected_output = "1 2 3\n2 4 6\n3 6 9\n"
starter_code    = """package main

import "fmt"

func main() {
	// nested for loops
}
"""
hints           = [
  "Use an outer loop for i := 1; i <= 3 and an inner loop for j := 1; j <= 3.",
  "Use fmt.Printf(\"%d \", i*j) inside the inner loop and fmt.Println() after the inner loop ends.",
]
validation_mode = "exact_stdout"
