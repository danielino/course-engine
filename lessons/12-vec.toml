id          = "12-vec"
title       = "Vec<T> — Dynamic Arrays"
description = "Create, grow, iterate, and manipulate Rust's dynamically-sized array type."

[[exercises]]
id              = "ex_01"
title           = "Create and push"
prompt          = """
Create an empty `Vec<i32>`, push `1`, `2`, and `3` into it, then print its length.

Expected output:
    3
"""
expected_output = "3"
starter_code    = """
fn main() {
    let mut v: Vec<i32> = Vec::new();
    // push 1, 2, 3
    println!("{}", v.len());
}
"""
hints = [
    "v.push(1); v.push(2); v.push(3);",
]

[[exercises]]
id              = "ex_02"
title           = "Iterate over a Vec"
prompt          = """
Create `vec![10, 20, 30]` and iterate over it with a `for` loop.
Print each element on its own line.

Expected output:
    10
    20
    30
"""
expected_output = "10\n20\n30"
starter_code    = """
fn main() {
    let v = vec![10, 20, 30];
    for x in &v {
        // print x
    }
}
"""
hints = [
    "println!(\"{}\", x);",
    "Iterating with &v borrows the elements — x is a &i32, which println! handles fine.",
]

[[exercises]]
id              = "ex_03"
title           = "pop"
prompt          = """
Push the numbers 1 through 5 into a Vec.
Pop the last element, print the popped value, then print the new length.

Expected output:
    5
    4
"""
expected_output = "5\n4"
starter_code    = """
fn main() {
    let mut v: Vec<i32> = (1..=5).collect();
    // pop and print the value
    // print the new length
}
"""
hints = [
    "v.pop() returns Option<i32> — unwrap it.",
    "println!(\"{}\", v.pop().unwrap()); then println!(\"{}\", v.len());",
]

[[exercises]]
id              = "ex_04"
title           = "retain"
prompt          = """
Start with `vec![1, 2, 3, 4, 5, 6]`.
Use `.retain(|&x| x % 2 == 0)` to keep only even numbers.
Print the remaining elements space-separated on one line.

Expected output:
    2 4 6
"""
expected_output = "2 4 6"
starter_code    = """
fn main() {
    let mut v = vec![1, 2, 3, 4, 5, 6];
    v.retain(|&x| x % 2 == 0);
    // print elements space-separated
}
"""
hints = [
    "Use a for loop or collect into strings.",
    "let s: Vec<String> = v.iter().map(|x| x.to_string()).collect(); println!(\"{}\", s.join(\" \"));",
]

[[exercises]]
id              = "ex_05"
title           = "sort and dedup"
prompt          = """
Start with `vec![3, 1, 2, 1, 3]`.
Sort it, then remove consecutive duplicates with `.dedup()`.
Print the remaining elements space-separated.

Expected output:
    1 2 3
"""
expected_output = "1 2 3"
starter_code    = """
fn main() {
    let mut v = vec![3, 1, 2, 1, 3];
    // sort and dedup
    // print space-separated
}
"""
hints = [
    "v.sort(); v.dedup();",
    "let s: Vec<String> = v.iter().map(|x| x.to_string()).collect(); println!(\"{}\", s.join(\" \"));",
]
