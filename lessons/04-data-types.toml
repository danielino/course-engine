id          = "04-data-types"
title       = "Scalar Data Types"
description = "Integers, floats, booleans, and characters — Rust's four scalar types."

[[exercises]]
id              = "ex_01"
title           = "Integer arithmetic"
prompt          = """
Declare two `i32` variables: `a = 12` and `b = 5`.
Print their sum, difference, product, and integer quotient, each on its own line.

Expected output:
    17
    7
    60
    2
"""
expected_output = "17\n7\n60\n2"
starter_code    = """
fn main() {
    let a: i32 = 12;
    let b: i32 = 5;
    // print sum, difference, product, quotient
}
"""
hints = [
    "Use println!(\"{}\", a + b); for each operation.",
    "Integer division in Rust truncates toward zero: 12 / 5 = 2.",
]

[[exercises]]
id              = "ex_02"
title           = "Float formatting"
prompt          = """
Declare `let pi: f64 = 3.14159`.
Multiply it by `2.0` and print the result formatted to **2 decimal places**.

Expected output:
    6.28
"""
expected_output = "6.28"
starter_code    = """
fn main() {
    let pi: f64 = 3.14159;
    // multiply and print with 2 decimal places
}
"""
hints = [
    "Use the format specifier {:.2} inside println! to limit decimal places.",
    "println!(\"{:.2}\", pi * 2.0);",
]

[[exercises]]
id              = "ex_03"
title           = "Boolean logic"
prompt          = """
Declare:
    let sunny = true;
    let warm  = false;

Print the result of `sunny && warm`, `sunny || warm`, and `!sunny` — each on its own line.

Expected output:
    false
    true
    false
"""
expected_output = "false\ntrue\nfalse"
starter_code    = """
fn main() {
    let sunny = true;
    let warm  = false;
    // print three boolean expressions
}
"""
hints = [
    "Use println!(\"{}\", expr); for each of the three expressions.",
]

[[exercises]]
id              = "ex_04"
title           = "Characters"
prompt          = """
Declare:
    let letter = 'R';
    let crab   = '🦀';

Print them on separate lines.

Expected output:
    R
    🦀
"""
expected_output = "R\n🦀"
starter_code    = """
fn main() {
    let letter = 'R';
    let crab   = '🦀';
    // print both
}
"""
hints = [
    "char literals use single quotes in Rust.",
    "println!(\"{}\", letter); works for chars.",
]

[[exercises]]
id              = "ex_05"
title           = "Type casting"
prompt          = """
Declare `let x: i32 = 65`.
Cast it to `u8`, then cast that to `char`, and print the character.

Expected output:
    A
"""
expected_output = "A"
starter_code    = """
fn main() {
    let x: i32 = 65;
    // cast x to u8, then to char, then print
}
"""
hints = [
    "Rust uses `as` for numeric casts: x as u8, then as char.",
    "let c = x as u8 as char;",
]
