id          = "02-variables"
title       = "Variables and Mutability"
description = "Declare variables with let, understand immutability by default, and use mut to allow changes."

[[exercises]]
id              = "ex_01"
title           = "Declare a variable"
prompt          = """
Declare a variable named `x` with the value `5`, then print it.

Expected output:

    x = 5

Use `let` to declare variables in Rust.
To print a variable, use a format string: `println!("x = {}", x);`
"""
expected_output = "x = 5"
starter_code    = """
fn main() {
    // declare x here
    println!("x = {}", x);
}
"""
hints = [
    "let x = 5;",
    "Integer literals in Rust don't need a type annotation for simple cases like this.",
]

[[exercises]]
id              = "ex_02"
title           = "Immutability"
prompt          = """
Variables in Rust are immutable by default.
The code below tries to change `x` after it is declared — it won't compile.

Make it compile and print:

    x = 10

You need to mark the variable as mutable.
"""
expected_output = "x = 10"
starter_code    = """
fn main() {
    let x = 5;
    x = 10;
    println!("x = {}", x);
}
"""
hints = [
    "Add `mut` between `let` and the variable name: `let mut x = 5;`",
]

[[exercises]]
id              = "ex_03"
title           = "Shadowing"
prompt          = """
Rust allows you to re-declare a variable with the same name using `let` again.
This is called shadowing — the new binding shadows the old one.

Print:

    x = 25

Declare `x = 5`, then shadow it with `x = x * x` (without using `mut`).
"""
expected_output = "x = 25"
starter_code    = """
fn main() {
    let x = 5;
    // shadow x here
    println!("x = {}", x);
}
"""
hints = [
    "let x = x * x;  — this creates a new binding that shadows the previous x.",
    "No mut needed: shadowing uses a new let, it does not mutate the existing binding.",
]
