id          = "24-error-handling-advanced"
title       = "Advanced Error Handling"
description = "Implement std::error::Error, use Box<dyn Error>, and build ergonomic error propagation chains."

[[exercises]]
id              = "ex_01"
title           = "Implement std::error::Error"
prompt          = """
Define `struct MyError(String)`.
Implement `std::fmt::Display` for it to show the inner message.
Implement `std::error::Error` for it (the default impl is enough).

Write a function that returns `Err(MyError(\"something went wrong\".into()))`.
In `main`, use `?` and propagate via `Result<(), Box<dyn std::error::Error>>`.
Print the error with `eprintln!` is not needed — just `println!` it after catching with `match`.

Expected output:
    something went wrong
"""
expected_output = "something went wrong"
starter_code    = """
use std::fmt;

struct MyError(String);

impl fmt::Display for MyError {
    fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
        write!(f, "{}", self.0)
    }
}

impl std::error::Error for MyError {}

fn fail() -> Result<(), MyError> {
    Err(MyError("something went wrong".into()))
}

fn main() {
    match fail() {
        Ok(_)  => {},
        Err(e) => println!("{}", e),
    }
}
"""
hints = [
    "std::error::Error has no required methods — `impl std::error::Error for MyError {}` is all you need.",
    "Display is already implemented so the Error impl just works.",
]

