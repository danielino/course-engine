[[exercises]]
id              = "ex_03"
title           = "From for automatic error conversion"
prompt          = """
Define two error types: `struct InnerError` and `struct OuterError(String)`.
Implement `From<InnerError> for OuterError` so it wraps the inner error.
Use `?` to automatically convert an `InnerError` into an `OuterError`.
Print the OuterError message.

Expected output:
    wrapped: inner error
"""
expected_output = "wrapped: inner error"
starter_code    = """
use std::fmt;

struct InnerError;
struct OuterError(String);

impl fmt::Display for OuterError {
    fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
        write!(f, "{}", self.0)
    }
}

impl From<InnerError> for OuterError {
    fn from(_: InnerError) -> Self {
        OuterError("wrapped: inner error".into())
    }
}

fn inner() -> Result<(), InnerError> {
    Err(InnerError)
}

fn outer() -> Result<(), OuterError> {
    inner()?;  // ? converts InnerError -> OuterError via From
    Ok(())
}

fn main() {
    match outer() {
        Ok(_)  => {},
        Err(e) => println!("{}", e),
    }
}
"""
hints = [
    "The From impl is already shown — ? calls it automatically when the error types differ.",
]

[[exercises]]
id              = "ex_04"
title           = "main returning Result"
prompt          = """
Write `fn main() -> Result<(), Box<dyn std::error::Error>>`.
Inside, parse `"10"` as `i32`, parse `"2"` as `i32`, divide them, and print the result.

Expected output:
    5
"""
expected_output = "5"
starter_code    = """
fn main() -> Result<(), Box<dyn std::error::Error>> {
    let a = "10".parse::<i32>()?;
    let b = "2".parse::<i32>()?;
    println!("{}", a / b);
    Ok(())
}
"""
hints = [
    "main() can return Result — if it returns Err, Rust prints the error and exits with code 1.",
    "The starter code is already correct — study how ? works here.",
]
