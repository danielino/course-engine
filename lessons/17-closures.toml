id          = "17-closures"
title       = "Closures"
description = "Write anonymous functions that capture their environment, and understand Fn / FnMut / FnOnce."

[[exercises]]
id              = "ex_01"
title           = "Basic closure"
prompt          = """
Declare `let double = |x: i32| x * 2;` and print `double(5)`.

Expected output:
    10
"""
expected_output = "10"
starter_code    = """
fn main() {
    let double = |x: i32| x * 2;
    println!("{}", double(5));
}
"""
hints = [
    "Closures use |params| body syntax.",
]

[[exercises]]
id              = "ex_02"
title           = "Capturing the environment"
prompt          = """
Declare:
    let offset: i32 = 10;
    let add_offset = |x| x + offset;

Print `add_offset(5)`.

Expected output:
    15
"""
expected_output = "15"
starter_code    = """
fn main() {
    let offset: i32 = 10;
    let add_offset = |x| x + offset;
    println!("{}", add_offset(5));
}
"""
hints = [
    "Closures automatically capture variables from the surrounding scope by reference.",
]

[[exercises]]
id              = "ex_03"
title           = "Closure as function argument"
prompt          = """
Write `fn apply<F: Fn(i32) -> i32>(f: F, x: i32) -> i32`.
Call it with the closure `|x| x * x` and the value `6`.
Print the result.

Expected output:
    36
"""
expected_output = "36"
starter_code    = """
fn apply<F: Fn(i32) -> i32>(f: F, x: i32) -> i32 {
    // call f with x and return the result
    todo!()
}

fn main() {
    let result = apply(|x| x * x, 6);
    println!("{}", result);
}
"""
hints = [
    "f(x)",
]

[[exercises]]
id              = "ex_04"
title           = "FnMut — mutating captured state"
prompt          = """
Create a counter closure that increments a captured `count` variable each time it is called.
Call it three times and print the last return value.

Expected output:
    3
"""
expected_output = "3"
starter_code    = """
fn main() {
    let mut count = 0;
    let mut inc = || {
        count += 1;
        count
    };
    inc();
    inc();
    println!("{}", inc());
}
"""
hints = [
    "The closure must be declared `mut` because it mutates captured state (FnMut).",
]

[[exercises]]
id              = "ex_05"
title           = "move closure"
prompt          = """
Create a `String` with value `"captured"`.
Use `move` to capture it into a closure.
Call the closure and print the string inside it.

Expected output:
    captured
"""
expected_output = "captured"
starter_code    = """
fn main() {
    let s = String::from("captured");
    let print_it = move || println!("{}", s);
    print_it();
}
"""
hints = [
    "move || { ... } takes ownership of all captured variables.",
    "After the move, s is no longer available in the outer scope.",
]
